<svg width="320" height="72" viewBox="0 0 320 72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pin-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B8FFF"/>
      <stop offset="100%" stop-color="#4F7CFF"/>
    </linearGradient>
  </defs>

  <!-- ── Map body ── -->
  <!-- Main white rectangle with rounded corners -->
  <rect x="5" y="14" width="50" height="48" rx="7" fill="white" stroke="#6B8FFF" stroke-width="2.2"/>

  <!-- Top-left folded flap -->
  <path d="M5 14 L5 30 L21 14 Z" fill="#D8E6FF" stroke="#6B8FFF" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Top-right folded flap (blue accent) -->
  <path d="M55 14 L55 26 L43 14 Z" fill="#6B8FFF" stroke="#6B8FFF" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- ── Location pin ── -->
  <circle cx="23" cy="26" r="6" fill="url(#pin-grad)"/>
  <circle cx="23" cy="26" r="2.6" fill="white"/>
  <!-- pin tail -->
  <path d="M23 32 L23 36" stroke="#4F7CFF" stroke-width="2.2" stroke-linecap="round"/>

  <!-- ── Dashed route ── -->
  <path d="M30 30 Q40 22 48 32" stroke="#B8CEFF" stroke-width="2" stroke-dasharray="3.5 3" stroke-linecap="round" fill="none"/>

  <!-- ── Road lines (bottom-left) ── -->
  <line x1="8" y1="46" x2="17" y2="38" stroke="#C8D8FF" stroke-width="2" stroke-linecap="round"/>
  <line x1="13" y1="57" x2="20" y2="48" stroke="#C8D8FF" stroke-width="2" stroke-linecap="round"/>

  <!-- ── Face: eyes ── -->
  <ellipse cx="24" cy="45" rx="2.8" ry="3.2" fill="#2B3A8F"/>
  <ellipse cx="36" cy="45" rx="2.8" ry="3.2" fill="#2B3A8F"/>

  <!-- ── Cheeks ── -->
  <ellipse cx="18.5" cy="50" rx="3.2" ry="1.8" fill="#BDD0FF" opacity="0.75"/>
  <ellipse cx="41.5" cy="50" rx="3.2" ry="1.8" fill="#BDD0FF" opacity="0.75"/>

  <!-- ── Smile ── -->
  <path d="M25 53 Q30 58 35 53" stroke="#2B3A8F" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- ── Wordmark text ── -->
  <text
    x="66"
    y="48"
    fill="#4F7CFF"
    font-family="Trebuchet MS, Verdana, Arial, sans-serif"
    font-size="36"
    font-weight="800"
    letter-spacing="-1"
  >Mapjiri</text>
</svg>
